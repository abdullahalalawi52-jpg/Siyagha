<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      :root {
        --color-logo-start: #e86c1a;
        --color-logo-end: #c8520d;
        --color-logo-accent-start: #2d1a08;
        --color-logo-accent-end: #1e1105;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-logo-start: #e86c1a;
          --color-logo-end: #c8520d;
          --color-logo-accent-start: #080e14;
          --color-logo-accent-end: #000000;
        }
      }
    </style>
    <linearGradient id="nibGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="var(--color-logo-start)" />
      <stop offset="100%" stopColor="var(--color-logo-end)" />
    </linearGradient>
    <linearGradient id="nibGradAccentFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="var(--color-logo-accent-start)" />
      <stop offset="100%" stopColor="var(--color-logo-accent-end)" />
    </linearGradient>
    <mask id="nibMask">
      <rect width="100" height="100" fill="white" />
      <line x1="50" y1="56" x2="50" y2="88" stroke="black" strokeWidth="3.5" strokeLinecap="round" />
      <circle cx="50" cy="56" r="4.5" fill="black" />
    </mask>
  </defs>
  <!-- Classical Column/Pillar Cap at the top -->
  <path d="M 28,12 L 72,12 L 72,18 L 28,18 Z" fill="url(#nibGradAccentFav)" />
  <path d="M 34,22 L 66,22 L 66,27 L 34,27 Z" fill="url(#nibGradAccentFav)" />
  <!-- Main Nib pointing downwards -->
  <path d="M 42,30 H 58 C 58,40 66,48 66,56 C 66,68 50,88 50,88 C 50,88 34,68 34,56 C 34,40 42,30 42,30 Z" fill="url(#nibGradFav)" mask="url(#nibMask)" />
</svg>
